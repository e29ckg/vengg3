version: '3.8' # แนะนำให้ใส่ version ของ Compose file ครับ

services:
  db:
    image: mysql:8.0
    container_name: vengg_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vengg_db
      TZ: Asia/Bangkok
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: always

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: vengg_pma
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "8081:80" 
    depends_on:
      - db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vengg_web
    environment:
      TZ: Asia/Bangkok
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html/vengg3
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ven_frontend # ปรับชื่อ container ให้ใช้ _ (underscore) เหมือนตัวอื่นๆ เพื่อความสวยงาม
    ports:
      - "8080:80" # เข้าเว็บ Frontend ผ่านพอร์ต 8080
    restart: always
    depends_on: # 🛠️ เพิ่ม: ให้ Frontend รอ Backend รันเสร็จก่อนค่อยทำงาน
      - backend

  cron-notifier:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: ven_cron_notifier
    environment:
      TZ: Asia/Bangkok
    volumes:
      - .:/var/www/html/vengg3
    command: sh -c "while true; do php /var/www/html/vengg3/backend/cron/daily_notify.php; sleep 60; done"
    depends_on:
      - db

volumes:
  db_data: